version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: researchradar_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-radaruser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radarpass}
      POSTGRES_DB: ${POSTGRES_DB:-researchradar}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-radaruser}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: researchradar_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

volumes:
  postgres_data:
  redis_data:
